<html lang="en">
<head>

        /* Dark mode styles */

</head>
<body class="light-mode">
    <h1>VisCarma Test – Buggy</h1>
    <button onclick="handleClick()">Click me</button>
    <p id="output"></p>

    <div>
        <input type="text" id="taskInput" placeholder="Add a new task">
        <button onclick="addTask()">Add Task</button>
    </div>
    <ul id="taskList"></ul>

    <label for="darkModeToggle">Dark Mode:</label>
    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">

    <script>
        // Fixed duplicate declaration
        let counter = 0;

        // Define the function before calling it
        function handleClick() {
            document.getElementById("output").innerHTML = "Clicked!";
            displayCurrentTime();
            showRandomQuote();
            return true;
        }

        // Corrected console.log statement
        console.log("Hello world");

        // Added missing semicolons
        let score = 99;

        // Fixed using 'var' instead of 'let'
        let oldWay = "should be let";

        // Define the function before calling it
        function doSomething(unusedParam) {
            return 42;
        }

        // Corrected function with no semicolon after assignment
        function handleClick() {
            document.getElementById("output").innerHTML = "Clicked!";
            displayCurrentTime();
            showRandomQuote();
            return true;
        }

        // Fixed extra trailing comma
        const config = {
            name: "test",
            version: 1,
        };

        // Define the function before calling it
        function doSomething(unusedParam) {
            return 42;
        }

        // Added missing 'break' in switch
        let color = "red";
        switch(color) {
            case "red":
                console.log("Red");
                break;
            case "blue":
                console.log("Blue");
                break;
        }

        // Function to display the current time
        function displayCurrentTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById("output").innerHTML += `<br>Current Time: ${timeString}`;
        }

        // Array of motivational quotes
        const quotes = [
            "Believe you can and you're halfway there.",
            "It always seems impossible until it's done.",
            "You miss 100% of the shots you don't take.",
            "The only limit to our realization of tomorrow is our doubts of today.",
            "Success is not final, failure is not fatal: It is the courage to continue that counts."
        ];

        // Function to show a random quote
        function showRandomQuote() {
            const randomIndex = Math.floor(Math.random() * quotes.length);
            document.getElementById("output").innerHTML += `<br>${quotes[randomIndex]}`;
        }

        // Function to add a task
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            if (taskText) {
                const li = document.createElement('li');
                li.className = 'task';
                li.innerHTML = `<span>${taskText}</span> <button onclick="markComplete(this)">Complete</button> <button onclick="deleteTask(this)">Delete</button>`;
                document.getElementById('taskList').appendChild(li);
                input.value = '';
                saveTasks();
            }
        }

        // Function to mark a task as complete
        function markComplete(button) {
            const li = button.parentElement;
            li.classList.toggle('complete');
            saveTasks();
        }

        // Function to delete a task
        function deleteTask(button) {
            const li = button.parentElement;
            li.remove();
            saveTasks();
        }

        // Function to save tasks to localStorage
        function saveTasks() {
            const tasks = document.querySelectorAll('.task');
            const taskArray = Array.from(tasks).map(task => task.innerHTML);
            localStorage.setItem('tasks', JSON.stringify(taskArray));
        }

        // Function to load tasks from localStorage
        function loadTasks() {
            const tasks = localStorage.getItem('tasks');
            if (tasks) {
                const taskArray = JSON.parse(tasks);
                taskArray.forEach(taskHTML => {
                    const li = document.createElement('li');
                    li.className = 'task';
                    li.innerHTML = taskHTML;
                    document.getElementById('taskList').appendChild(li);
                });
            }
        }

        // Function to toggle dark mode
        function toggleDarkMode() {
            if (document.body.classList.contains('dark-mode')) {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
            }
        }

        // Load tasks when the page loads
        window.onload = loadTasks;
    </script>
</body>
</html>
